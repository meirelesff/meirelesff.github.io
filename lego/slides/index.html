# Religião e política

.font90[
&gt; I draw on an array of novel empirical evidence to demonstrate how progressive Catholic clergy benefited the PT. Leveraging .grifo[archival material], I first establish that progressive bishops made economic inequality a political issue and advocated redistributive economic policies to reduce disparities between the rich and poor. I also examine the ways in which replacing progressive bishops reshaped church dynamics at the local level. .grifo[Evidence from an original, parish-level dataset] indicates that their replacement significantly increased the turnover of local priests between 1965 and 1997. This turnover primarily targeted progressive priests, disrupting their ability to establish local ties and curtailing their political reach. 
]

# Ciência Social Quantitativa

O que distingue a Ciência Social Quantitativa de outras formas de investigação social? O que fazemos que é diferente?

--

.alert[
.texto2[Abordagem] é a principal diferença, isto é, *como criamos e conectamos modelos analíticos à metodologia de pesquisa para testar proposições de natureza causal* ou de *mensuração*
]
