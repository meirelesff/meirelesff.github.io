]

]
]

# *Bootstrap*

&lt;svg viewBox="0 0 512 512" style="height:1em;position:relative;display:inline-block;top:.1em;fill:#8f2a43;" xmlns="http://www.w3.org/2000/svg"&gt;  &lt;path d="M256 8c137 0 248 111 248 248S393 504 256 504 8 393 8 256 119 8 256 8zm-28.9 143.6l75.5 72.4H120c-13.3 0-24 10.7-24 24v16c0 13.3 10.7 24 24 24h182.6l-75.5 72.4c-9.7 9.3-9.9 24.8-.4 34.3l11 10.9c9.4 9.4 24.6 9.4 33.9 0L404.3 273c9.4-9.4 9.4-24.6 0-33.9L271.6 106.3c-9.4-9.4-24.6-9.4-33.9 0l-11 10.9c-9.5 9.6-9.3 25.1.4 34.4z"&gt;&lt;/path&gt;&lt;/svg&gt; A ideia é a seguinte: tratamos a nossa *amostra* como se ela fosse a *população* e reamostramos dela várias vezes

.pull-left[
&lt;svg viewBox="0 0 512 512" style="height:1em;position:relative;display:inline-block;top:.1em;fill:#8f2a43;" xmlns="http://www.w3.org/2000/svg"&gt;  &lt;path d="M256 8c137 0 248 111 248 248S393 504 256 504 8 393 8 256 119 8 256 8zm-28.9 143.6l75.5 72.4H120c-13.3 0-24 10.7-24 24v16c0 13.3 10.7 24 24 24h182.6l-75.5 72.4c-9.7 9.3-9.9 24.8-.4 34.3l11 10.9c9.4 9.4 24.6 9.4 33.9 0L404.3 273c9.4-9.4 9.4-24.6 0-33.9L271.6 106.3c-9.4-9.4-24.6-9.4-33.9 0l-11 10.9c-9.5 9.6-9.3 25.1.4 34.4z"&gt;&lt;/path&gt;&lt;/svg&gt; .texto2[Intuição]: a melhor evidência que temos sobre a população é *a nossa própria amostra da população*

.font90[
- .texto2[Reamostragem com reposição]: pegamos uma observação, anotamos, devolvemos e pegamos outra; uma mesma pessoa pode ser sorteada várias vezes
]
]

.pull-right[
&lt;svg viewBox="0 0 512 512" style="height:1em;position:relative;display:inline-block;top:.1em;fill:#8f2a43;" xmlns="http://www.w3.org/2000/svg"&gt;  &lt;path d="M256 8c137 0 248 111 248 248S393 504 256 504 8 393 8 256 119 8 256 8zm-28.9 143.6l75.5 72.4H120c-13.3 0-24 10.7-24 24v16c0 13.3 10.7 24 24 24h182.6l-75.5 72.4c-9.7 9.3-9.9 24.8-.4 34.3l11 10.9c9.4 9.4 24.6 9.4 33.9 0L404.3 273c9.4-9.4 9.4-24.6 0-33.9L271.6 106.3c-9.4-9.4-24.6-9.4-33.9 0l-11 10.9c-9.5 9.6-9.3 25.1.4 34.4z"&gt;&lt;/path&gt;&lt;/svg&gt; .texto2[Objetivo]: termos uma ideia de como a média variaria se pudéssemos ter várias amostras

# Intervalo de confiança

No exemplo anterior, a área cinza é o nosso .texto2[intervalo de confiança], i.e. a faixa que acreditamos conter a média populacional 95% das vezes caso repetíssemos a amostragem

# Probabilidade como funções

Distribuições de probabilidade são funções que descrevem a probabilidade de cada valor possível de uma variável aleatória


.pull-left[
.texto2[Notação]
.font90[
- `\(X\)` é a variável aleatória

- `\(P(X = x)\)` é a probabilidade de `\(X\)` assumir o valor `\(x\)`

- `\(f(x)\)` é a função de densidade/massa de probabilidade (PDF ou PMF) de `\(X\)`
]
]


.pull-right[
&lt;svg viewBox="0 0 448 512" style="height:1em;position:relative;display:inline-block;top:.1em;fill:#8f2a43;" xmlns="http://www.w3.org/2000/svg"&gt;  &lt;path d="M190.5 66.9l22.2-22.2c9.4-9.4 24.6-9.4 33.9 0L441 239c9.4 9.4 9.4 24.6 0 33.9L246.6 467.3c-9.4 9.4-24.6 9.4-33.9 0l-22.2-22.2c-9.5-9.5-9.3-25 .4-34.3L311.4 296H24c-13.3 0-24-10.7-24-24v-32c0-13.3 10.7-24 24-24h287.4L190.9 101.2c-9.8-9.3-10-24.8-.4-34.3z"&gt;&lt;/path&gt;&lt;/svg&gt; Isso significa que probabilidade é uma função que *mapeia valores possíveis de uma variável aleatória para a probabilidade de cada valor ocorrer*
]

# Axiomas

.texto2[Probabilidade] é uma teoria definida, convencionada, que possui três regras básicas:

1. `\(P(x) \geq 0\)` para todo evento `\(x\)`

2. `\(P(\Omega) = 1\)`, onde `\(\Omega\)` é o espaço amostral

3. Se `\(x_1\)` e `\(x_2\)` são eventos mutuamente exclusivos, então `\(P(x_1 \cup x_2) = P(x_1) + P(x_2)\)`

&lt;svg viewBox="0 0 512 512" style="height:1em;position:relative;display:inline-block;top:.1em;fill:#8f2a43;" xmlns="http://www.w3.org/2000/svg"&gt;  &lt;path d="M256 8c137 0 248 111 248 248S393 504 256 504 8 393 8 256 119 8 256 8zm-28.9 143.6l75.5 72.4H120c-13.3 0-24 10.7-24 24v16c0 13.3 10.7 24 24 24h182.6l-75.5 72.4c-9.7 9.3-9.9 24.8-.4 34.3l11 10.9c9.4 9.4 24.6 9.4 33.9 0L404.3 273c9.4-9.4 9.4-24.6 0-33.9L271.6 106.3c-9.4-9.4-24.6-9.4-33.9 0l-11 10.9c-9.5 9.6-9.3 25.1.4 34.4z"&gt;&lt;/path&gt;&lt;/svg&gt; Em palavras, probabilidades não devem ser negativas, cada evento possível deve ter uma prob. associada exclusiva e a soma de todas as probs. deve ser igual a 1

# PMF e PDF

Variáveis discretas e contínuas têm funções de prob. diferentes

.pull-left[
.texto2[PMF]

.font90[
Quanto temos eventos discretos (e.g., lançamento de moeda ou dado), chamamos .texto2[função de massa de probabilidade (*PMF*)]. Exemplos comuns:

- .texto2[Binomial]: número de sucessos em `\(n\)` tentativas
- .texto2[Bernoulli]: prob. de sucesso ou fracasso
]
]

.pull-right[
.texto2[PDF]

.font90[
Quando temos eventos contínuos (e.g., altura, peso, tempo), chamamos .texto2[função de densidade de probabilidade (*PDF*)]. Exemplos:

- .texto2[Normal]: distribuição simétrica
- .texto2[Uniforme]: todos os valores são igualmente prováveis
]
]

# Binomial

A distribuição .texto2[binomial] é usada para modelar o número de sucessos em `\(n\)` tentativas independentes, onde cada tentativa tem a mesma probabilidade de sucesso `\(p\)` e fracasso `\(1 - p\)`. O exemplo típico é: qual a probabilidade de obter `\(k\)` caras em `\(n\)` lançamentos de uma moeda?

.pull-left[
.texto2[Notação]

.font90[
- `\(k\)` é o número de sucessos

- `\(n\)` é o número de tentativas

- `\(p\)` é a probabilidade de sucesso em cada tentativa
]
]

.pull-right[
.texto2[Parâmetros]

Algumas distribuições têm parâmetros que definem a forma da distribuição; no caso da binomial, são `\(n\)` e `\(p\)` definem a forma da distribuição
]

# De onde vem o lucro no Bicho?

Os tipos de apostas mais comuns:

.pull-left[
.font80[
- .texto2[Grupo]: ganha se o número sorteado tiver os dois últimos dígitos entre as dezenas do *grupo*
    - Prêmio geralmente de 18 vezes o valor apostado

- .texto2[Dezena]: ganha se o número sorteado tiver os dois últimos dígitos iguais à dezena apostada
    - Prêmio geralmente de 60 vezes o valor apostado
]
]

.pull-right[
.font80[
- .texto2[Centena]: ganha se o número sorteado tiver os três últimos dígitos iguais à centena apostada
    - Prêmio geralmente de 600 vezes o valor apostado
- .texto2[Milhar]: ganha se o número sorteado tiver os quatro últimos dígitos iguais à milhar apostada
    - Prêmio geralmente de 4000 vezes o valor apostado
]
]

# Simulando um jogo

&lt;svg viewBox="0 0 512 512" style="height:1em;position:relative;display:inline-block;top:.1em;fill:#8f2a43;" xmlns="http://www.w3.org/2000/svg"&gt;  &lt;path d="M256 8c137 0 248 111 248 248S393 504 256 504 8 393 8 256 119 8 256 8zm-28.9 143.6l75.5 72.4H120c-13.3 0-24 10.7-24 24v16c0 13.3 10.7 24 24 24h182.6l-75.5 72.4c-9.7 9.3-9.9 24.8-.4 34.3l11 10.9c9.4 9.4 24.6 9.4 33.9 0L404.3 273c9.4-9.4 9.4-24.6 0-33.9L271.6 106.3c-9.4-9.4-24.6-9.4-33.9 0l-11 10.9c-9.5 9.6-9.3 25.1.4 34.4z"&gt;&lt;/path&gt;&lt;/svg&gt; Vamos simular um jogo simples, no *grupo*, i.e., apostamos R$ 1,00 no *burro* (grupo 3)

.pull-left2[
.font90[
- Se sair um número com os dois últimos dígitos entre 09, 10, 11 ou 12, ganhamos R$ 18,00
- Perdemos R$ 1,00 caso contrário
]
]

.pull-right2[
.font80[

``` r
burro &lt;- 9:12
sorteado &lt;- sample(0:9999, 1)

# Dois ultimos digitos
sorteados &lt;- str_sub(sorteados, -2, -1)
sorteado &lt;- as.numeric(sorteado)

ifelse(sorteado %in% burro, 18, -1)
```

```
## [1] -1
```
]
]

&lt;svg viewBox="0 0 512 512" style="height:1em;position:relative;display:inline-block;top:.1em;fill:#8f2a43;" xmlns="http://www.w3.org/2000/svg"&gt;  &lt;path d="M256 8c137 0 248 111 248 248S393 504 256 504 8 393 8 256 119 8 256 8zm-28.9 143.6l75.5 72.4H120c-13.3 0-24 10.7-24 24v16c0 13.3 10.7 24 24 24h182.6l-75.5 72.4c-9.7 9.3-9.9 24.8-.4 34.3l11 10.9c9.4 9.4 24.6 9.4 33.9 0L404.3 273c9.4-9.4 9.4-24.6 0-33.9L271.6 106.3c-9.4-9.4-24.6-9.4-33.9 0l-11 10.9c-9.5 9.6-9.3 25.1.4 34.4z"&gt;&lt;/path&gt;&lt;/svg&gt; Se repetirmos esse jogo 1000 vezes, qual será nosso saldo total?

.font80[

``` r
set.seed(404)
n &lt;- 1000
burro &lt;- 9:12

sorteados &lt;- sample(0:9999, n, replace = TRUE)
sorteados &lt;- str_sub(sorteados, -2, -1)
sorteados &lt;- as.numeric(sorteados)

resultados &lt;- ifelse(sorteados %in% burro, 18, -1)
sum(resultados)
```
