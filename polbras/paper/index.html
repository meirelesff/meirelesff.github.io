# Motivation

Can politicians capture electoral returns by co-opting existing social policies?

.pull-left[
&lt;svg viewBox="0 0 512 512" style="height:1em;position:relative;display:inline-block;top:.1em;fill:#8f2a43;" xmlns="http://www.w3.org/2000/svg"&gt;  &lt;path d="M256 8c137 0 248 111 248 248S393 504 256 504 8 393 8 256 119 8 256 8zm-28.9 143.6l75.5 72.4H120c-13.3 0-24 10.7-24 24v16c0 13.3 10.7 24 24 24h182.6l-75.5 72.4c-9.7 9.3-9.9 24.8-.4 34.3l11 10.9c9.4 9.4 24.6 9.4 33.9 0L404.3 273c9.4-9.4 9.4-24.6 0-33.9L271.6 106.3c-9.4-9.4-24.6-9.4-33.9 0l-11 10.9c-9.5 9.6-9.3 25.1.4 34.4z"&gt;&lt;/path&gt;&lt;/svg&gt; Scholarship suggests incumbents reap rewards for implementing CCTs via voters' retrospective evaluations
]

.pull-right[
&lt;svg viewBox="0 0 512 512" style="height:1em;position:relative;display:inline-block;top:.1em;fill:#8f2a43;" xmlns="http://www.w3.org/2000/svg"&gt;  &lt;path d="M256 8c137 0 248 111 248 248S393 504 256 504 8 393 8 256 119 8 256 8zm-28.9 143.6l75.5 72.4H120c-13.3 0-24 10.7-24 24v16c0 13.3 10.7 24 24 24h182.6l-75.5 72.4c-9.7 9.3-9.9 24.8-.4 34.3l11 10.9c9.4 9.4 24.6 9.4 33.9 0L404.3 273c9.4-9.4 9.4-24.6 0-33.9L271.6 106.3c-9.4-9.4-24.6-9.4-33.9 0l-11 10.9c-9.5 9.6-9.3 25.1.4 34.4z"&gt;&lt;/path&gt;&lt;/svg&gt; Whether voters reward rivals who appropriate existing programs remains an open empirical puzzle
]

# Our contribution

We examine .texto2[Auxílio Brasil], an extreme case of policy appropriation: Bolsonaro rebranded and massively expanded Bolsa Família, the flagship CCT established by the rival Workers' Party (PT). We depart from previous work in two ways:

.pull-left[

&lt;svg viewBox="0 0 512 512" style="height:1em;position:relative;display:inline-block;top:.1em;fill:#8f2a43;" xmlns="http://www.w3.org/2000/svg"&gt;  &lt;path d="M256 8c137 0 248 111 248 248S393 504 256 504 8 393 8 256 119 8 256 8zm-28.9 143.6l75.5 72.4H120c-13.3 0-24 10.7-24 24v16c0 13.3 10.7 24 24 24h182.6l-75.5 72.4c-9.7 9.3-9.9 24.8-.4 34.3l11 10.9c9.4 9.4 24.6 9.4 33.9 0L404.3 273c9.4-9.4 9.4-24.6 0-33.9L271.6 106.3c-9.4-9.4-24.6-9.4-33.9 0l-11 10.9c-9.5 9.6-9.3 25.1.4 34.4z"&gt;&lt;/path&gt;&lt;/svg&gt; We use a series of difference-in-differences (DiD) designs to estimate the effect of Auxílio Brasil
]

.pull-right[
&lt;svg viewBox="0 0 512 512" style="height:1em;position:relative;display:inline-block;top:.1em;fill:#8f2a43;" xmlns="http://www.w3.org/2000/svg"&gt;  &lt;path d="M256 8c137 0 248 111 248 248S393 504 256 504 8 393 8 256 119 8 256 8zm-28.9 143.6l75.5 72.4H120c-13.3 0-24 10.7-24 24v16c0 13.3 10.7 24 24 24h182.6l-75.5 72.4c-9.7 9.3-9.9 24.8-.4 34.3l11 10.9c9.4 9.4 24.6 9.4 33.9 0L404.3 273c9.4-9.4 9.4-24.6 0-33.9L271.6 106.3c-9.4-9.4-24.6-9.4-33.9 0l-11 10.9c-9.5 9.6-9.3 25.1.4 34.4z"&gt;&lt;/path&gt;&lt;/svg&gt; We analyze individual-level repeated survey data
]

# Data and methods



---
# Data

.pull-left[
- `5564` municipalities over 2018 and 2022 elections (1st and 2nd rounds)
- Microdata on Auxílio Brasil monthly payments per municipality (more than $18 billion)
- Sociodemographic data on eligible voters (sex, age, education, and marital status)
]

.pull-right[
We complement our main dataset with additional data:

.font90[
- 1989, 1994, 1998, 2002, 2006, 2010, and 2014 electoral results by municipality (PT's vote share)
- Electoral results by Brazilian voting abroad (i.e., 140 cities around the world)
- 17 waves of pre-electoral polls coduncted by .texto2[Quaest] (almost 40,000 interviews over the 2022 electoral year)
]
]

# Identification strategy

Let `\(i\)` denote municipalities (i.e., `\(i = 1, ..., I\)`), `\(t\)` years ( `\(t = 1,...,T\)` ), and `\(D_i\)` treatment status. For each municipality `\(i\)` in year `\(t\)`, we observe the vote share `\(Y_{it}\)` for Bolsonaro

--

`$$Y_{it} = \delta (\text{Post}_{t} \times D_{i}) + \mathbf{X}_{it}\boldsymbol{\gamma} + \mu_{i} + \sum_{s} \lambda_s (\text{State}_{i} = s) \times t + \epsilon_{it}$$`

&lt;svg viewBox="0 0 512 512" style="height:1em;position:relative;display:inline-block;top:.1em;fill:#8f2a43;" xmlns="http://www.w3.org/2000/svg"&gt;  &lt;path d="M256 8c137 0 248 111 248 248S393 504 256 504 8 393 8 256 119 8 256 8zm-28.9 143.6l75.5 72.4H120c-13.3 0-24 10.7-24 24v16c0 13.3 10.7 24 24 24h182.6l-75.5 72.4c-9.7 9.3-9.9 24.8-.4 34.3l11 10.9c9.4 9.4 24.6 9.4 33.9 0L404.3 273c9.4-9.4 9.4-24.6 0-33.9L271.6 106.3c-9.4-9.4-24.6-9.4-33.9 0l-11 10.9c-9.5 9.6-9.3 25.1.4 34.4z"&gt;&lt;/path&gt;&lt;/svg&gt; where `\(D_i\)` is the treatment variable indicating (1) heavy coverage by Auxílio Brasil (more than 25% of the electorate) and (0) if below 5%


---
# Event-study model

We analyze individual-level effects using an event-study approach with survey data:

`$$Y_{it} = \sum_{t \neq 3} \delta_{t} (\text{Wave}_{t} \times D_{i}) + \mathbf{X}_{it}\boldsymbol{\gamma} + \lambda_i + \epsilon_{it}$$`

`\(\delta_{t}\)` captures interaction effects of survey waves with treatment, `\(\mathbf{X}_{it}\)` includes control variables
